name: update-stats
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch stats
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN || github.token }}
        run: |
          LOGIN="rawfrmm"
          REPOS=$(gh api user/repos --paginate --jq '.[].full_name' 2>/dev/null || gh api users/$LOGIN/repos --paginate --jq '.[].full_name')
          TOTAL_A=0; TOTAL_D=0; TOTAL_C=0
          for R in $REPOS; do
            OUT=""
            for i in 1 2 3 4 5; do
              OUT=$(gh api "repos/$R/stats/contributors" 2>/dev/null || true)
              [ -n "$OUT" ] && [ "$OUT" != "null" ] && [ "$OUT" != "[]" ] && break
              sleep 4
            done
            [ -z "$OUT" ] && continue
            read A D C < <(echo "$OUT" | jq -r --arg u "$LOGIN" '[.[] | select(.author.login==$u)] | [([.[].weeks[].a]|add)//0,([.[].weeks[].d]|add)//0,([.[].total]|add)//0] | @tsv' | tr '\t' ' ')
            TOTAL_A=$((TOTAL_A+A)); TOTAL_D=$((TOTAL_D+D)); TOTAL_C=$((TOTAL_C+C))
          done
          echo "COMMITS=$TOTAL_C" >> "$GITHUB_ENV"
          echo "ADDS=$TOTAL_A" >> "$GITHUB_ENV"
          echo "DELS=$TOTAL_D" >> "$GITHUB_ENV"
      - name: Generate card
        if: env.COMMITS != '0'
        run: python3 generate_card.py --commits "$COMMITS" --adds "$ADDS" --dels "$DELS"
      - name: Commit if changed
        if: env.COMMITS != '0'
        run: |
          git config user.name "rawform-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rawform-card.svg
          git diff --cached --quiet || { git commit -m "stats: refresh card"; git push; }
