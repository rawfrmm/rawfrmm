name: update-stats
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch stats
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN || github.token }}
        run: |
          LOGIN="rawfrmm"
          LIST=$(gh api "user/repos?per_page=100&affiliation=owner" --paginate 2>/dev/null || true)
          if echo "$LIST" | jq -e 'type=="array"' >/dev/null 2>&1; then
            REPOS=$(echo "$LIST" | jq -r '.[].full_name')
            echo "using authenticated repo list (private included)"
          else
            REPOS=$(gh api "users/$LOGIN/repos?per_page=100" --paginate --jq '.[].full_name')
            echo "using public repo list only (add STATS_TOKEN secret for private repos)"
          fi
          TOTAL_A=0; TOTAL_D=0; TOTAL_C=0
          for R in $REPOS; do
            OUT=""
            for i in 1 2 3 4 5 6; do
              RESP=$(gh api "repos/$R/stats/contributors" 2>/dev/null || true)
              if echo "$RESP" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
                OUT="$RESP"; break
              fi
              sleep 5
            done
            [ -z "$OUT" ] && { echo "skip $R (no stats)"; continue; }
            read A D C < <(echo "$OUT" | jq -r --arg u "$LOGIN" \
              '[.[] | select(.author.login==$u)]
               | [([.[].weeks[].a]|add)//0, ([.[].weeks[].d]|add)//0, ([.[].total]|add)//0]
               | @tsv' | tr '\t' ' ')
            echo "$R commits=$C adds=$A dels=$D"
            TOTAL_A=$((TOTAL_A+A)); TOTAL_D=$((TOTAL_D+D)); TOTAL_C=$((TOTAL_C+C))
          done
          echo "totals commits=$TOTAL_C adds=$TOTAL_A dels=$TOTAL_D"
          echo "COMMITS=$TOTAL_C" >> "$GITHUB_ENV"
          echo "ADDS=$TOTAL_A" >> "$GITHUB_ENV"
          echo "DELS=$TOTAL_D" >> "$GITHUB_ENV"
      - name: Generate card
        if: env.COMMITS != '0'
        run: python3 generate_card.py --commits "$COMMITS" --adds "$ADDS" --dels "$DELS"
      - name: Commit if changed
        if: env.COMMITS != '0'
        run: |
          git config user.name "rawform-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rawform-card.svg
          git diff --cached --quiet || { git commit -m "stats: refresh card"; git push; }
